name: Build and Release
on:
  push:
    tags:
      - 'v*' 

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install pyinstaller cryptography
      
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: pyinstaller --noconsole --onefile --icon="icon.ico" --name "FileEncrypter_Win" main.py
      
      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconsole --onefile --windowed --icon="icon.icns" --name "FileEncrypter_Mac" main.py
          cd dist
          zip -r ../FileEncrypter_Mac.zip FileEncrypter_Mac.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist/*.exe
            FileEncrypter_Mac.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-latest-build/FileEncrypter_Win.exe
            macos-latest-build/FileEncrypter_Mac.zip
