name: Cross-Platform Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install pyinstaller cryptography

      # WINDOWS
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: pyinstaller --noconsole --onefile --icon="${{ github.workspace }}/icon.ico" --name "SecureCrypt_Win" main.py

      # MAC
      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconsole --onefile --windowed --icon="${{ github.workspace }}/icon.icns" --name "SecureCrypt_Mac" main.py
          cd dist && zip -r ../SecureCrypt_Mac.zip SecureCrypt_Mac.app

      # LINUX
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --noconsole --onefile --name "SecureCrypt_Linux" main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/SecureCrypt_Win.exe
            dist/SecureCrypt_Linux
            SecureCrypt_Mac.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: assets
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            assets/**/SecureCrypt_Win.exe
            assets/**/SecureCrypt_Mac.zip
            assets/**/SecureCrypt_Linux
