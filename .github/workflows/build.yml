name: Build and Release Cross-Platform
on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag like v1.0, v2.0, etc.

jobs:
  build:
    strategy:
      matrix:
        # Run three separate computers at once
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pyinstaller cryptography

      # WINDOWS BUILD
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --icon="icon.ico" --name "FileEncrypter_Win" main.py

      # MAC BUILD
      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          # Use --icon for the .app bundle
          pyinstaller --noconsole --onefile --windowed --icon="icon.icns" --name "FileEncrypter_Mac" main.py
          cd dist
          zip -r ../FileEncrypter_Mac.zip FileEncrypter_Mac.app

      # LINUX BUILD (Icons work differently on Linux, usually bundled as data)
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --onefile --name "FileEncrypter_Linux" main.py

      # 4. UPLOAD STAGE (Saves files temporarily)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/FileEncrypter_Win.exe
            dist/FileEncrypter_Linux
            FileEncrypter_Mac.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # This glob pattern (**/) finds the files regardless of folder structure
          files: |
            all-assets/**/FileEncrypter_Win.exe
            all-assets/**/FileEncrypter_Mac.zip
            all-assets/**/FileEncrypter_Linux
