name: Build and Release
on:
  push:
    tags:
      - 'v*' # Triggers build when you push a tag like v1.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            out_name: FileEncrypter_Win.exe
            path: dist/FileEncrypter_Win.exe
          - os: macos-latest
            out_name: FileEncrypter_Mac.app
            path: dist/FileEncrypter_Mac.app
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pyinstaller --noconsole --onefile --name "FileEncrypter_Win" main.py
          else
            pyinstaller --noconsole --onefile --windowed --icon="icon.icns" --name "FileEncrypter_Mac" main.py
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: ${{ matrix.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            FileEncrypter_Win.exe/FileEncrypter_Win.exe
            FileEncrypter_Mac.app/FileEncrypter_Mac.app
